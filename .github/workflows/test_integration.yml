# to be deleted after the first successful run, as this workflow is now reusable and can be called from other workflows
# *******************************************************************************
name: Integration Tests (Nightly)
on:
  workflow_dispatch:
  pull_request:
    types: [opened, reopened, synchronize]
  push:
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
permissions:
  contents: write
  pull-requests: write
  pages: write
  id-token: write
  actions: read
  packages: read
  security-events: write
jobs:
  sw-check:
    uses: ./.github/workflows/reusable_sw-check.yml
    secrets: inherit
    with:
      update_to_latest: true
      repo_runner_labels: 'ubuntu-latest'
      target_branch: '${{ github.ref }}'
      
  codeql-scan:
    uses: ./.github/workflows/reusable_codeql-multiple-repo-scan.yml
    secrets: inherit
  update_known_good:
    name: update_known_good
    runs-on: ubuntu-latest
    needs: sw-check
    steps:
      - name: checkout
        uses: actions/checkout@v6.0.2
      - name: download known_good.updated.json artifact
        uses: actions/download-artifact@v4
        with:
          name: known_good.updated.json
      - name: update MODULE.bazel files
        run: |-
          echo "::group::update bazel_common/score_modules_*.MODULE.bazel"
          scripts/known_good/update_module_from_known_good.py --known known_good.updated.json --output-dir-modules bazel_common
          cat bazel_common/score_modules_*.MODULE.bazel
          echo "::endgroup::"
