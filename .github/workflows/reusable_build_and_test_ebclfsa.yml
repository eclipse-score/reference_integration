name: EB corbos Linux for Safety Applications - Build & Integration Test
on:
  workflow_call:
  # pull_request:
  #   types: [opened, reopened, synchronize]
  # merge_group:
  #   types: [checks_requested]
  # push:
  #   branches:
  #     - main
# Do not flood CI with unneeded previous runs in PR
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: ${{ github.ref_name != 'main' && !startsWith(github.ref_name, 'release/') }}
jobs:
  build:
    name: aarch64
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/eclipse-score/devcontainer:v1.1.0
    steps:
      - name: Clean disk space
        uses: eclipse-score/more-disk-space@v1
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
      - name: download known_good.updated.json artifact
        if: github.event_name == 'workflow_call'
        uses: actions/download-artifact@v4
        with:
          name: known_good.updated.json
      - name: update MODULE.bazel files
        if: github.event_name == 'workflow_call'
        run: |
          echo "::group::update bazel_common/score_modules_*.MODULE.bazel"
          scripts/known_good/update_module_from_known_good.py --known known_good.updated.json --output-dir-modules bazel_common
          cat bazel_common/score_modules_*.MODULE.bazel
          echo "::endgroup::"
      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.18.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true
          cache-save: ${{ github.event_name == 'push' }}
      - name: Build for EB corbos Linux for Safety Applications and run tests
        run: |
          bazel build --lockfile_mode=error --config=eb-aarch64 //images/ebclfsa_aarch64/scrample_integration:run
      - name: Upload test logs
        uses: actions/upload-artifact@v5
        with:
          name: test-logs
          path: |
            bazel-bin/images/ebclfsa_aarch64/scrample_integration/*.log
