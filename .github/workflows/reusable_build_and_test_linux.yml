name: Linux - Build & Integration Test
on:
  workflow_call:
  # pull_request:
  # release:
  #   types: [created]
  # push:
  #   branches:
  #     - main
# Do not flood CI with unneeded previous runs in PR
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: ${{ github.ref_name != 'main' && !startsWith(github.ref_name, 'release/') }}
jobs:
  x86_64:
    runs-on: ubuntu-latest
    permissions:
      contents: write # required to upload release assets
    steps:
      - name: Clean disk space
        uses: eclipse-score/more-disk-space@v1
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
      - name: download known_good.updated.json artifact
        if: github.event_name == 'workflow_call'
        uses: actions/download-artifact@v4
        with:
          name: known_good.updated.json
      - name: update MODULE.bazel files
        if: github.event_name == 'workflow_call'
        run: |
          echo "::group::update bazel_common/score_modules_*.MODULE.bazel"
          scripts/known_good/update_module_from_known_good.py --known known_good.updated.json --output-dir-modules bazel_common
          cat bazel_common/score_modules_*.MODULE.bazel
          echo "::endgroup::"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.8.0
      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.18.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true
          cache-save: ${{ github.event_name == 'push' }}
      - name: Build image
        run: |
          bazel build --lockfile_mode=error --config=linux-x86_64 //images/linux_x86_64:image
      - name: Integration tests
        run: |
          bazel test --lockfile_mode=error --config=linux-x86_64 //feature_integration_tests/itf
