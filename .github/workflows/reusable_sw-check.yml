# Module Smoke Test Workflow
#
# Summary:
#   Orchestrates validation of modules by producing a known_good.updated.json
#   and then invoking the integration build workflow to compile and test.
#
# Modes of operation (controlled by inputs):
#   1. External module PR (github.repository != reference_integration_repo):
#      Overrides `module_name` to the PR commit SHA.
#   2. Nightly / latest (update_to_latest=true):
#      Updates all modules to latest HEAD on their branch
#      (via update_module_latest.py).
#   3. PR / pinned (update_to_latest=false, default):
#      Uses the repository's known_good.json as-is.
#
# What it does:
#   - Checks out the reference integration repository
#   - Generates known_good.updated.json (see modes above)
#   - Uploads known_good.updated.json as an artifact
#   - Calls the Module Integration Build workflow with a matrix of configs
#   - Publishes a summary to the GitHub Step Summary
#
# Inputs:
#   - repo_runner_labels (string, required, default: ubuntu-latest): Runner label.
#   - module_name (string, optional): Module to override for external PRs.
#   - update_to_latest (boolean, optional, default: false): When true, updates
#     all modules to the latest commit on their branch. Used for nightly builds.
#   - target_branch (string, required, default: main):
#     The ref to checkout via actions/checkout — can be a branch name, tag, or
#     commit SHA. This ensures the workflow uses the exact version of the
#     integration files you intend.
#
# Repository Variables:
#   - reference_integration_repo (optional): Repository providing integration
#     workflows and tools (format: owner/repo). Supports private forks.
#     Default: eclipse-score/reference_integration
#
# Secrets:
#   - REPO_READ_TOKEN (optional): Token for reading private repos; falls back to
#     github.token when not provided.
#
# Usage:
#   This workflow is reusable and triggered via workflow_call from other workflows.
#
#   External module PR:
#     jobs:
#       smoke:
#         uses: eclipse-score/reference_integration/.github/workflows/reusable_sw-check.yml@main
#         with:
#           module_name: score_baselibs
#           target_branch: main
#         secrets:
#           REPO_READ_TOKEN: ${{ secrets.REPO_READ_TOKEN }}
#
#   Nightly (latest HEAD):
#     jobs:
#       nightly:
#         uses: ./.github/workflows/reusable_sw-check.yml
#         with:
#           update_to_latest: true
#           target_branch: main
#
#   PR (pinned known_good.json):
#     jobs:
#       pr:
#         uses: ./.github/workflows/reusable_sw-check.yml
#         with:
#           target_branch: ${{ github.ref }}
#
#   Note: Set the 'reference_integration_repo' repository variable to use a
#   private fork (e.g., my-org/reference_integration).
#
# Notes:
#   - Extend the matrix in `integration-test` to cover additional configs.
name: Module Smoke Test
on:
  workflow_call:
    inputs:
      repo_runner_labels:
        description: 'The runner tag to use for the job'
        required: true
        type: string
        default: 'ubuntu-latest'
      module_name:
        description: 'Name of the module to override (e.g., score_baselibs). Required for external module PRs.'
        required: false
        type: string
        default: ''
      update_to_latest:
        description: 'When true, update all modules to latest HEAD on their branch (nightly mode).'
        required: false
        type: boolean
        default: false
      target_branch:
        description: 'Ref to checkout (branch, tag, or commit SHA).'
        required: true
        type: string
        default: 'main'
    outputs:
      known_good_updated_file:
        description: "Updated known_good.json content"
        value: "known_good.updated.json"
    secrets:
      REPO_READ_TOKEN:
        description: 'Token for reading repositories'
        required: false
permissions:
  contents: write
  pull-requests: write
  pages: write
  id-token: write
env:
  REFERENCE_INTEGRATION_REPO: ${{ vars.reference_integration_repo != '' && vars.reference_integration_repo || 'eclipse-score/reference_integration' }}
jobs:
  preparation:
    name: Preparation
    runs-on: ubuntu-latest
    outputs:
      known_good_updated: ${{ steps.set_known_good.outputs.known_good_updated }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          repository: ${{ env.REFERENCE_INTEGRATION_REPO }}
          ref: ${{ inputs.target_branch }}
          token: ${{ secrets.REPO_READ_TOKEN != '' && secrets.REPO_READ_TOKEN || github.token }}
      - name: Create updated known_good.json
        id: set_known_good
        run: |
          if [ "${{ github.repository }}" != "${{ env.REFERENCE_INTEGRATION_REPO }}" ]; then
            # External module PR: override the specific module to the PR commit
            echo "Overriding ${{ inputs.module_name }} with current PR"
            python3 scripts/known_good/override_known_good_repo.py \
              --known known_good.json \
              --output known_good.updated.json \
              --module-override ${{ inputs.module_name }}@${{ github.event.repository.clone_url }}@${{ github.sha }}
          elif [ "${{ inputs.update_to_latest }}" = "true" ]; then
            # Nightly mode: update all modules to latest HEAD on their branch
            echo "Updating all modules to latest commits"
            echo "::group::get latest commits from module branches"
            python3 scripts/known_good/update_module_latest.py --output known_good.updated.json
            cat known_good.updated.json
            echo "::endgroup::"
          else
            # PR mode: use the pinned known_good.json from the repository
            echo "Using pinned known_good.json from repository"
            cp known_good.json known_good.updated.json
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.REPO_READ_TOKEN != '' && secrets.REPO_READ_TOKEN || github.token }}
      - name: Show updated known_good.json and MODULE.bazel files
        run: |
          echo "::group::Updated known_good.updated.json"
          cat known_good.updated.json
          echo "::endgroup::"

          echo "::group::Updated bazel_common/score_modules_*.MODULE.bazel"
          cat bazel_common/score_modules_*.MODULE.bazel
          echo "::endgroup::"
      - name: Upload updated known_good.json artifact
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: error
          name: known_good.updated.json
          path: known_good.updated.json
  utest:
    name: Unit Tests
    needs: preparation
    # uses: ./.github/workflows/reusable_test_and_docs.yml
    # secrets: inherit
    runs-on: ubuntu-latest
    steps:
      - name: not implemented
        run: echo "separate doc workflow"
  docs:
    name: Generate Documentation
    needs: utest
    steps:
      - name: not implemented
        run: echo "separate doc workflow"
  build_and_test_autosd:
    name: build_and_test_autosd
    needs: docs
    uses: ./.github/workflows/reusable_build_and_test_autosd.yml
    secrets: inherit
  build_and_test_ebclfsa:
    name: build_and_test_ebclfsa
    needs: docs
    uses: ./.github/workflows/reusable_build_and_test_ebclfsa.yml
    secrets: inherit
  build_and_test_linux:
    name: build_and_test_linux
    needs: docs
    uses: ./.github/workflows/reusable_build_and_test_linux.yml
    secrets: inherit
  build_and_test_qnx:
    name: build_and_test_qnx
    needs: docs
    uses: ./.github/workflows/reusable_build_and_test_qnx.yml
    secrets: inherit
  summary:
    name: Publish Summary
    runs-on: ubuntu-latest
    needs: [build_and_test_autosd, build_and_test_ebclfsa, build_and_test_linux, build_and_test_qnx]
    if: always()
    steps:
      - name: summary
        run: |
          echo "run publish_integration_summary.py"
